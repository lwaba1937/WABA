<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WABA OFFICIAL</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Graduate&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json?v=5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WABA">
    <link rel="apple-touch-icon" href="bg.jpeg?v=5">
</head>
<body>
    <div class="app-layout">
        <!-- GAUCHE : Playlist Centrale -->
        <main class="content-area">
            <header class="site-header">
                <div class="logo-image-main">
                    <img src="bg.jpeg" alt="WABA Logo" class="logo-img">
                </div>
            </header>

            <div class="large-playlist-container">
                <h2 class="large-playlist-title">🎵 Playlist Officielle</h2>
                <ul id="playlist" class="playlist large-playlist">
                    <li class="playlist-empty">Aucune musique chargée</li>
                </ul>
            </div>
        </main>

        <!-- DROITE : Le Lecteur de Musique -->
        <aside class="sidebar-player">
            <div class="player-container">
                <!-- Header retiré -->
                
                <div class="album-art-container">
                    <div class="album-art" id="albumArt">
                        <div class="music-note">🎵</div>
                    </div>
                </div>

                <div class="track-info">
                    <h1 id="trackTitle">Sélectionnez une musique</h1>
                    <p id="trackArtist">WABA Officiel</p>
                </div>

                <div class="progress-container">
                    <span id="currentTime">0:00</span>
                    <input type="range" id="progressBar" min="0" max="100" value="0">
                    <span id="duration">0:00</span>
                </div>

                <div class="controls">
                    <button class="btn-control" id="loopBtn" title="Boucler la chanson">
                        <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
                    </button>
                    <button class="btn-control" id="prevBtn">
                        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="btn-play" id="playBtn">
                        <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="btn-control" id="nextBtn">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>
                
                <div class="file-loader">
                    <label for="audioUpload" id="adminUploadBtn" class="upload-btn" title="Mode Administrateur">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1-.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM8.9 6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2H8.9V6z"/></svg>
                    </label>
                    <input type="file" id="audioUpload" accept="audio/*" multiple style="display: none;">
                </div>
            </div>
        </aside>

    </div>

    <!-- Élément audio masqué -->
    <audio id="mainAudio" playsinline preload="auto"></audio>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw_v5.js?v=5').then(registration => {
                    console.log('SW registered');
                });
            });
        }
    </script>
    <script src="app.js?v=5"></script>
</body>
</html>
